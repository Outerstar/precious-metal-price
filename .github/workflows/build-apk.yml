name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libstdc++6 \
          autoconf \
          libtool \
          libffi-dev \
          liblzma-dev \
          openjdk-17-jdk-headless \
          python3-dev \
          pkg-config \
          ccache
          
        # 设置Java环境
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        
    - name: Cache Buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.local/share/buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
          
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer==1.6.0 cython==0.29.37 pexpect
        
    - name: Display Buildozer version
      run: buildozer --version
      
    - name: Build Debug APK
      run: |
        buildozer android debug
      env:
        ANDROID_HOME: /tmp/android-sdk
        ANDROID_NDK_HOME: /tmp/android-ndk
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: precious-metal-price-debug-${{ github.run_id }}
        path: bin/*.apk
        retention-days: 30
        
    - name: Create Release (only on tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
