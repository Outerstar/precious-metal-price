name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libstdc++6 \
          autoconf \
          libtool \
          libffi-dev \
          liblzma-dev \
          openjdk-17-jdk-headless \
          python3-dev \
          pkg-config \
          ccache
          
        # 设置Java环境
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        
    - name: Cache Buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.local/share/buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
          
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer==1.6.0 cython==0.29.37 pexpect
        
    - name: Install Android SDK & NDK
      run: |
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_ROOT/cmdline-tools
        
        # Download & extract command-line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d /tmp/
        mv /tmp/cmdline-tools $SDK_ROOT/cmdline-tools/latest
        
        # Accept licenses & install build-tools + platform
        yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT "build-tools;33.0.3" "platforms;android-33" "ndk;25.2.9519653"
        
        # Create symlink for legacy tools/bin path (Buildozer expects this)
        mkdir -p $SDK_ROOT/tools/bin
        ln -s $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $SDK_ROOT/tools/bin/sdkmanager
        
        # Verify aidl exists
        ls -la $SDK_ROOT/build-tools/33.0.3/aidl
        
        # Set env vars for Buildozer/p4a
        echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
        
    - name: Display Buildozer version
      run: buildozer --version
      
    - name: Build Debug APK
      run: |
        buildozer android debug
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: precious-metal-price-debug-${{ github.run_id }}
        path: bin/*.apk
        retention-days: 30
        
    - name: Create Release (only on tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
